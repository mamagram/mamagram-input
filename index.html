<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>mamagram input</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Playfair+Display:ital,wght@1,600;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF4EE;
      --card: #FFFFFF;
      --border: #F1DAD4;
      --border-strong: #E8C4BC;
      --text: #3D2C2C;
      --muted: #9A8983;
      --placeholder: #C9B7B1;
      --coral: #D96B5C;
      --coral-dark: #C2503F;
      --coral-pale: #FBEAE6;
      --green: #8FBC8F;
      --dot-upcoming: #F4D6D0;
      --shadow: 0 2px 10px rgba(61,44,44,0.06);
    }
    
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      padding-bottom: 40px;
    }
    
    header.topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #fff;
      border-bottom: 1px solid #ECECEC;
      position: sticky;
      top: 0;
      z-index: 30;
    }
    
    .iconbtn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #EEECEA;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      font-size: 18px;
      color: #333;
      cursor: pointer;
    }
    
    header.topbar h1 {
      font-size: 19px;
      font-weight: 700;
      margin: 0;
    }
    
    .brandrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 6px;
    }
    
    .brandrow .logo {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 30px;
      color: var(--coral);
      font-weight: 600;
    }
    
    .badge {
      background: var(--coral);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      padding: 6px 16px;
      border-radius: 999px;
    }
    
    nav.tabs {
      display: flex;
      border-bottom: 1px solid #ECECEC;
      background: #fff;
    }
    
    nav.tabs button {
      flex: 1;
      padding: 16px 0;
      background: none;
      border: none;
      font-size: 16px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
    
    nav.tabs button.active {
      color: var(--coral);
      border-bottom-color: var(--coral);
    }
    
    .progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 6px;
    }
    
    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--dot-upcoming);
    }
    
    .dot.done {
      background: var(--green);
    }
    
    .dot.active {
      width: 34px;
      background: var(--coral);
    }
    
    .steplabel {
      font-size: 13px;
      color: var(--muted);
    }
    
    .content {
      padding: 10px 18px 24px;
    }
    
    .field {
      margin-bottom: 26px;
    }
    
    .field label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    .field label .req {
      color: var(--coral-dark);
      font-size: 13px;
      font-weight: 700;
      margin-left: 6px;
    }
    
    .field label .opt {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      margin-left: 6px;
    }
    
    .field .hint {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-left: 4px;
    }
    
    input[type=text],
    input[type=number],
    input[type=url],
    textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 17px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
    }
    
    input::placeholder,
    textarea::placeholder {
      color: var(--placeholder);
    }
    
    input:focus,
    textarea:focus {
      border-color: var(--coral);
    }
    
    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.6;
    }
    
    .eng-display {
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      background: var(--coral-pale);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .eng-display .lbl {
      color: var(--muted);
      font-size: 16px;
    }
    
    .eng-display .val {
      font-size: 20px;
      font-weight: 700;
      color: var(--coral-dark);
    }
    
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .pill {
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    
    .pill.selected {
      background: var(--coral);
      border-color: var(--coral);
      color: #fff;
    }
    
    .genre-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .genre-pill {
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 14px 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    
    .genre-pill.selected {
      background: var(--coral);
      border-color: var(--coral);
      color: #fff;
    }
    
    .subhead {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      margin: 14px 0 10px;
    }
    
    .btnrow {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    
    .btn {
      flex: 1;
      border-radius: 18px;
      padding: 18px 0;
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      border: none;
    }
    
    .btn-primary {
      background: var(--coral);
      color: #fff;
    }
    
    .btn-primary:active {
      background: var(--coral-dark);
    }
    
    .btn-secondary {
      background: #fff;
      color: var(--text);
      border: 1.5px solid var(--border-strong);
      flex: 0 0 34%;
    }
    
    .list-toolbar {
      padding: 16px 18px 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .copybtn {
      background: #fff;
      border: 1.5px solid var(--coral);
      color: var(--coral-dark);
      border-radius: 16px;
      padding: 14px;
      font-weight: 700;
      font-size: 14.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .clearbtn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      text-decoration: underline;
      padding: 8px;
      cursor: pointer;
    }
    
    .entry-card {
      background: #fff;
      border: 1px solid #F1E8E4;
      border-radius: 18px;
      padding: 16px 18px;
      margin: 0 18px 12px;
      box-shadow: var(--shadow);
    }
    
    .entry-card .row1 {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    
    .entry-card .name {
      font-weight: 700;
      font-size: 16px;
    }
    
    .entry-card .handle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }
    
    .statuschip {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }
    
    .statuschip.候補 { background: #F3EEFD; color: #7A6BC2; }
    .statuschip.掲載済み { background: #E6F4E9; color: #469A5C; }
    .statuschip.連絡中 { background: #FFF3DD; color: #B98217; }
    .statuschip.見送り { background: #F0F0F0; color: #999; }
    
    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    
    .entry-del {
      background: none;
      border: none;
      color: #C97A6E;
      font-size: 12px;
      margin-top: 10px;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }
    
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 60px 30px;
      font-size: 14px;
      line-height: 1.8;
    }
    
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      z-index: 100;
      white-space: nowrap;
    }
    
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <script>
    const MAIN_GENRES = [
      { v: '総合育児・ライフスタイル', label: '総合育児', e: '🍼' },
      { v: '離乳食・食育', label: '離乳食・食育', e: '🍴' },
      { v: 'ねんね・睡眠', label: 'ねんね・睡眠', e: '😴' },
      { v: '知育・教育', label: '知育・教育', e: '📚' },
      { v: '収納・インテリア', label: '収納・インテリア', e: '🏠' },
      { v: '節約・家計', label: '節約・家計', e: '💰' },
      { v: 'ファッション・おしゃれ', label: 'ファッション', e: '👗' },
      { v: 'ウェルネス・美容', label: 'ウェルネス', e: '🧘' },
      { v: 'おでかけ・旅行', label: 'おでかけ・旅行', e: '✈️' },
      { v: '育児グッズ', label: '育児グッズ', e: '🛒' },
      { v: 'その他', label: 'その他', e: '🔖' }
    ];
    
    const SUB_GENRES = [
      'グッズ紹介', 'おもちゃ', '絵本', 'ファッション', 'お出かけ', 'PR・案件',
      '子供ごはん・レシピ', 'モンテッソーリ', '手作りおもちゃ', 'プチプラ・100均',
      '旅行', 'グルメ', '知育玩具', '美容・スキンケア', 'サプリ・健康',
      '子供との接し方・声かけ', 'マタニティ'
    ];
    
    const CHILD1_AGES = [
      { v: '0歳', e: '🍼' }, { v: '1歳', e: '🧸' }, { v: '2歳', e: '🧸' },
      { v: '3歳', e: '🎠' }, { v: '4歳', e: '✏️' }, { v: '5歳', e: '✏️' },
      { v: '6歳', e: '🎒' }, { v: '小学1年', e: '🎒' }, { v: '小学2年', e: '🎒' },
      { v: '小学3年以上', e: '🎒' }, { v: '不明', e: '❓' }
    ];
    
    const CHILD2_AGES = [
      { v: '0歳', e: '🍼' }, { v: '1歳', e: '🧸' }, { v: '2歳', e: '🧸' },
      { v: '3歳', e: '🎠' }, { v: '4歳', e: '✏️' }, { v: '5歳', e: '✏️' },
      { v: '6歳以上', e: '🎒' }, { v: '妊娠中', e: '🤰' }, { v: '2人目希望中', e: '✨' },
      { v: '不明', e: '❓' }
    ];
    
    const PLATFORMS = [
      { v: 'Instagram', e: '📸' },
      { v: 'X', e: '✗' },
      { v: 'YouTube', e: '▶️' },
      { v: 'TikTok', e: '🎵' }
    ];
    
    const POST_FREQ = [
      '毎日', '週4〜5回', '週3〜4回', '週2〜3回',
      '週1〜2回', '週1回', '月2〜3回', '不定期'
    ];
    
    const PR_STATUS = [
      { v: 'あり', e: '✅' },
      { v: 'なし', e: '❌' },
      { v: '不明', e: '❓' }
    ];
    
    const LISTING_STATUS = ['候補', '掲載済み', '連絡中', '見送り'];
    
    const VIBES = [
      'ハイエンド・上質系', 'ナチュラル・おしゃれ系',
      'プチプラ・庶民派', 'ミックス'
    ];
    
    const STEP_LABELS = ['基本情報', 'ジャンル', '数字・頻度', 'メモ・URL'];
    
    let state = {
      tab: 'add',
      step: 0,
      entries: [],
      form: emptyForm()
    };
    
    function emptyForm() {
      return {
        name: '', handle: '', platform: 'Instagram', mainGenre: '',
        subGenres: [], child1Age: '', child2Ages: [], childCount: '',
        vibe: '', followers: '', avgLikes: '', postFreq: '',
        prStatus: '', buzzUrl: '', buzzLikes: '', status: '候補', memo: ''
      };
    }
    
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
    }
    
    function engRate(f, l) {
      f = parseFloat(f);
      l = parseFloat(l);
      if (!f || !l) return null;
      return (l / f * 100);
    }
    
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(window.__tt);
      window.__tt = setTimeout(() => t.classList.remove('show'), 1800);
    }
    
    function esc(s) {
      return (s || '').toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
    
    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (e) {
        try {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          return true;
        } catch (e2) {
          return false;
        }
      }
    }
    
    function saveEntries() {
      localStorage.setItem('mamagram-entries', JSON.stringify(state.entries));
    }
    
    function loadEntries() {
      try {
        const d = localStorage.getItem('mamagram-entries');
        state.entries = d ? JSON.parse(d) : [];
      } catch (e) {
        state.entries = [];
      }
      render();
    }
    
    function ageString(e) {
      return [e.child1Age, ...(e.child2Ages || [])].filter(Boolean).join('／');
    }
    
    function buildBlockA() {
      return state.entries.map((e, i) => [
        i + 1, e.name, e.handle, e.mainGenre, e.subGenres.join('／'),
        ageString(e), e.childCount, e.vibe, e.followers, e.avgLikes
      ].join('\t')).join('\n');
    }
    
    function buildBlockB() {
      return state.entries.map(e => [
        e.postFreq, e.buzzUrl, e.buzzLikes, e.prStatus,
        e.status, e.memo, e.registDate
      ].join('\t')).join('\n');
    }
    
    async function copyBlock(w) {
      if (!state.entries.length) {
        showToast('まだデータがありません');
        return;
      }
      const ok = await copyText(w === 'A' ? buildBlockA() : buildBlockB());
      showToast(ok ? 'コピーしました' : 'コピーに失敗しました');
    }
    
    async function deleteEntry(id) {
      state.entries = state.entries.filter(e => e.id !== id);
      saveEntries();
      render();
    }
    
    async function clearAll() {
      if (!confirm('全データを削除します。コピーは済んでいますか？')) return;
      state.entries = [];
      saveEntries();
      render();
    }
    
    function switchTab(t) {
      state.tab = t;
      render();
    }
    
    function toggleSub(s) {
      const i = state.form.subGenres.indexOf(s);
      if (i >= 0) state.form.subGenres.splice(i, 1);
      else state.form.subGenres.push(s);
      render();
    }
    
    function toggleChild2(v) {
      const i = state.form.child2Ages.indexOf(v);
      if (i >= 0) state.form.child2Ages.splice(i, 1);
      else state.form.child2Ages.push(v);
      render();
    }
    
    function goNext1() {
      if (!state.form.name.trim() || !state.form.handle.trim()) {
        showToast('アカウント名とハンドル名を入力してください');
        return;
      }
      state.step = 1;
      render();
    }
    
    function goNext2() {
      if (!state.form.mainGenre) {
        showToast('メインジャンルを選んでください');
        return;
      }
      state.step = 2;
      render();
    }
    
    function renderEngOnly() {
      const el = document.getElementById('eng-val');
      if (el) {
        const r = engRate(state.form.followers, state.form.avgLikes);
        el.textContent = r === null ? '—' : r.toFixed(2) + '%';
      }
    }
    
    async function saveEntry() {
      const f = state.form;
      const entry = {
        id: Date.now(),
        name: f.name.trim(),
        handle: f.handle.trim(),
        platform: f.platform,
        mainGenre: f.mainGenre,
        subGenres: [...f.subGenres],
        child1Age: f.child1Age,
        child2Ages: [...f.child2Ages],
        childCount: f.childCount,
        vibe: f.vibe,
        followers: f.followers,
        avgLikes: f.avgLikes,
        postFreq: f.postFreq,
        prStatus: f.prStatus,
        buzzUrl: f.buzzUrl,
        buzzLikes: f.buzzLikes,
        status: f.status || '候補',
        memo: f.memo,
        registDate: todayStr()
      };
      state.entries.push(entry);
      saveEntries();
      state.form = emptyForm();
      state.step = 0;
      showToast(`保存しました（${state.entries.length}件）`);
      render();
    }
    
    function render() {
      const app = document.getElementById('app');
      const step = state.step;
      
      app.innerHTML = `
        <header class="topbar">
          <button class="iconbtn">✕</button>
          <h1>mamagram input</h1>
          <button class="iconbtn">⋯</button>
        </header>
        ${state.tab === 'add' && step === 0 ? `
          <div class="brandrow">
            <div class="logo">mamagram</div>
            <div class="badge">${state.entries.length}件</div>
          </div>
        ` : ''}
        <nav class="tabs">
          <button class="${state.tab === 'add' ? 'active' : ''}" onclick="switchTab('add')">＋ 追加</button>
          <button class="${state.tab === 'list' ? 'active' : ''}" onclick="switchTab('list')">📋 一覧</button>
        </nav>
        ${state.tab === 'add' ? renderAdd() : renderList()}
      `;
    }
    
    function renderAdd() {
      const s = state.step;
      return `
        <div class="progress">
          <div class="dots">
            ${[0, 1, 2, 3].map(i => i < s ? '<div class="dot done"></div>' : i === s ? '<div class="dot active"></div>' : '<div class="dot"></div>').join('')}
          </div>
          <div class="steplabel">${STEP_LABELS[s]}</div>
        </div>
        <div class="content">
          ${s === 0 ? renderS1() : s === 1 ? renderS2() : s === 2 ? renderS3() : renderS4()}
        </div>
      `;
    }
    
    function renderS1() {
      const f = state.form;
      return `
        <div class="field">
          <label>アカウント名 <span class="req">必須</span></label>
          <input type="text" value="${esc(f.name)}" placeholder="例）はなまるママ" oninput="state.form.name=this.value">
        </div>
        <div class="field">
          <label>＠ハンドル名 <span class="req">必須</span></label>
          <input type="text" value="${esc(f.handle)}" placeholder="例）hanamaru_mama（@不要）" oninput="state.form.handle=this.value">
        </div>
        <div class="field">
          <label>プラットフォーム</label>
          <div class="pills">
            ${PLATFORMS.map(p => `
              <div class="pill ${f.platform === p.v ? 'selected' : ''}" onclick="state.form.platform='${p.v}';render()">
                ${p.e} ${p.v}
              </div>
            `).join('')}
          </div>
        </div>
        <div class="btnrow">
          <button class="btn btn-primary" onclick="goNext1()">次へ →</button>
        </div>
      `;
    }
    
    function renderS2() {
      const f = state.form;
      return `
        <div class="field">
          <label>メインジャンル <span class="req">必須</span></label>
          <div class="genre-grid">
            ${MAIN_GENRES.map(g => `
              <div class="genre-pill ${f.mainGenre === g.v ? 'selected' : ''}" onclick="state.form.mainGenre='${g.v}';render()">
                ${g.e} ${g.label}
              </div>
            `).join('')}
          </div>
        </div>
        <div class="field">
          <label>サブジャンル <span class="opt">（複数タップ可）</span></label>
          <div class="pills">
            ${SUB_GENRES.map(s => `
              <div class="pill ${f.subGenres.includes(s) ? 'selected' : ''}" onclick="toggleSub('${s}')">${s}</div>
            `).join('')}
          </div>
        </div>
        <div class="field">
          <label>子供の年齢 <span class="opt">（複数可）</span></label>
          <div class="subhead">👶 第1子</div>
          <div class="pills">
            ${CHILD1_AGES.map(a => `
              <div class="pill ${f.child1Age === a.v ? 'selected' : ''}" onclick="state.form.child1Age='${a.v}';render()">
                ${a.e} ${a.v}
              </div>
            `).join('')}
          </div>
          <div class="subhead">👶👶 第2子以降（複数選択可）</div>
          <div class="pills">
            ${CHILD2_AGES.map(a => `
              <div class="pill ${f.child2Ages.includes(a.v) ? 'selected' : ''}" onclick="toggleChild2('${a.v}')">
                ${a.e} ${a.v}
              </div>
            `).join('')}
          </div>
        </div>
        <div class="field">
          <label>子供の人数 <span class="opt">（任意）</span></label>
          <div class="pills">
            ${['1人', '2人', '3人', '4人以上'].map(n => `
              <div class="pill ${f.childCount === n ? 'selected' : ''}" onclick="state.form.childCount='${n}';render()">${n}</div>
            `).join('')}
          </div>
        </div>
        <div class="field">
          <label>アカウントの雰囲気 <span class="opt">（任意）</span></label>
          <div class="pills">
            ${VIBES.map(v => `
              <div class="pill ${f.vibe === v ? 'selected' : ''}" onclick="state.form.vibe='${v}';render()">${v}</div>
            `).join('')}
          </div>
        </div>
        <div class="btnrow">
          <button class="btn btn-secondary" onclick="state.step=0;render()">← 戻る</button>
          <button class="btn btn-primary" onclick="goNext2()">次へ →</button>
        </div>
      `;
    }
    
    function renderS3() {
      const f = state.form;
      const r = engRate(f.followers, f.avgLikes);
      return `
        <div class="field">
          <label>フォロワー数</label>
          <input type="number" inputmode="numeric" value="${esc(f.followers)}" placeholder="例）42000" oninput="state.form.followers=this.value;renderEngOnly()">
        </div>
        <div class="field">
          <label>平均いいね数 <span class="hint">（直近10投稿の目安でOK）</span></label>
          <input type="number" inputmode="decimal" value="${esc(f.avgLikes)}" placeholder="例）1526" oninput="state.form.avgLikes=this.value;renderEngOnly()">
        </div>
        <div class="field">
          <label>ENG率 <span class="opt">（自動計算）</span></label>
          <div class="eng-display">
            <span class="lbl">エンゲージメント率</span>
            <span class="val" id="eng-val">${r === null ? '—' : r.toFixed(2) + '%'}</span>
          </div>
        </div>
        <div class="field">
          <label>投稿頻度 <span class="opt">（フィード）</span></label>
          <div class="pills">
            ${POST_FREQ.map(p => `
              <div class="pill ${f.postFreq === p ? 'selected' : ''}" onclick="state.form.postFreq='${p}';render()">${p}</div>
            `).join('')}
          </div>
        </div>
        <div class="field">
          <label>PR実績</label>
          <div class="pills">
            ${PR_STATUS.map(p => `
              <div class="pill ${f.prStatus === p.v ? 'selected' : ''}" onclick="state.form.prStatus='${p.v}';render()">
                ${p.e} ${p.v}
              </div>
            `).join('')}
          </div>
        </div>
        <div class="btnrow">
          <button class="btn btn-secondary" onclick="state.step=1;render()">← 戻る</button>
          <button class="btn btn-primary" onclick="state.step=3;render()">次へ →</button>
        </div>
      `;
    }
    
    function renderS4() {
      const f = state.form;
      return `
        <div class="field">
          <label>バズ投稿URL <span class="opt">（任意）</span></label>
          <input type="url" value="${esc(f.buzzUrl)}" placeholder="https://www.instagram.com/p/..." oninput="state.form.buzzUrl=this.value">
        </div>
        <div class="field">
          <label>バズいいね数 <span class="opt">（任意）</span></label>
          <input type="number" inputmode="numeric" style="margin-top:10px" value="${esc(f.buzzLikes)}" placeholder="例）12000" oninput="state.form.buzzLikes=this.value">
        </div>
        <div class="field">
          <label>掲載ステータス</label>
          <div class="pills">
            ${LISTING_STATUS.map(s => `
              <div class="pill ${f.status === s ? 'selected' : ''}" onclick="state.form.status='${s}';render()">${s}</div>
            `).join('')}
          </div>
        </div>
        <div class="field">
          <label>メモ <span class="opt">（雰囲気・特徴など自由に）</span></label>
          <textarea placeholder="例）柔らかくおしゃれな雰囲気…" oninput="state.form.memo=this.value">${esc(f.memo)}</textarea>
        </div>
        <div class="btnrow">
          <button class="btn btn-secondary" onclick="state.step=2;render()">← 戻る</button>
          <button class="btn btn-primary" onclick="saveEntry()">✅ 保存する</button>
        </div>
      `;
    }
    
    function renderList() {
      return `
        <div class="list-toolbar">
          <button class="copybtn" onclick="copyBlock('A')">📋 ① A〜J列をコピー（基本〜雰囲気）</button>
          <button class="copybtn" onclick="copyBlock('B')">📋 ② L〜S列をコピー（投稿頻度〜登録日）</button>
          <div style="text-align:center">
            <button class="clearbtn" onclick="clearAll()">コピー済みデータを全削除</button>
          </div>
        </div>
        ${state.entries.length === 0 ? `
          <div class="empty-state">
            まだ保存されたアカウントがありません。<br>
            「＋追加」タブから入力してみましょう。
          </div>
        ` : state.entries.slice().reverse().map(e => `
          <div class="entry-card">
            <div class="row1">
              <div>
                <div class="name">${esc(e.name)}</div>
                <div class="handle">@${esc(e.handle)}</div>
              </div>
              <div class="statuschip ${esc(e.status)}">${esc(e.status)}</div>
            </div>
            <div class="entry-meta">
              <span>${esc(e.mainGenre)}</span>
              <span>👥 ${e.followers || '-'}</span>
              <span>💗 ${e.avgLikes || '-'}</span>
              <span>📈 ${engRate(e.followers, e.avgLikes) === null ? '—' : engRate(e.followers, e.avgLikes).toFixed(2) + '%'}</span>
              ${ageString(e) ? `<span>👶 ${esc(ageString(e))}</span>` : ''}
            </div>
            <button class="entry-del" onclick="deleteEntry(${e.id})">削除</button>
          </div>
        `).join('')}
      `;
    }
    
    loadEntries();
  </script>
</body>
</html>
